<div class="overflow-x-auto">
  {% if rows|length == 0 %}
    <div class="text-sm text-slate-400 py-6 text-center border border-dashed border-slate-700 rounded-md">
      Keine Records gefunden.
    </div>
  {% else %}
    <table class="w-full text-sm border-separate" style="border-spacing: 0;">
      <thead>
        <tr class="text-left text-xs text-slate-400">
          <th class="py-2 px-2 border-b border-slate-800">ID</th>
          {% for f in fields %}
            <th class="py-2 px-2 border-b border-slate-800">{{ f.display_name }}</th>
          {% endfor %}
          <th class="py-2 px-2 border-b border-slate-800"></th>
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr class="hover:bg-slate-900/40">
          <td class="py-2 px-2 border-b border-slate-900 text-xs text-slate-400">{{ row["_id"] }}</td>
          {% for f in fields %}
            <td class="py-2 px-2 border-b border-slate-900">
              {{ row.get(f.id|string, "") }}
            </td>
          {% endfor %}
          <td class="py-2 px-2 border-b border-slate-900 text-right">
            <form method="post" action="/app/workspaces/{{ workspace.id }}/records/{{ row['_id'] }}/delete">
              <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token or request.cookies.get('csrf_token', '') }}">
              <button class="text-xs text-red-400 hover:text-red-300" type="submit">Löschen</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  {% endif %}
</div>
