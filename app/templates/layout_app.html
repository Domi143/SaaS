{% extends "base.html" %}

{% block body %}
<div class="min-h-screen flex bg-slate-950 text-slate-100">
  <aside class="hidden md:flex md:flex-col w-60 border-r border-slate-800 bg-slate-900/60">
    <div class="px-4 py-4 border-b border-slate-800 flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg bg-indigo-500"></div>
      <span class="font-semibold text-sm">FlexDB</span>
    </div>
    <nav class="flex-1 px-3 py-4 text-sm space-y-1">
      <a href="/app/dashboard" class="block px-3 py-2 rounded-md hover:bg-slate-800">Dashboard</a>
      <a href="/app/workspaces" class="block px-3 py-2 rounded-md hover:bg-slate-800">Workspaces</a>
      <a href="/app/billing" class="block px-3 py-2 rounded-md hover:bg-slate-800">Billing</a>
      <a href="/app/account" class="block px-3 py-2 rounded-md hover:bg-slate-800">Account</a>
    </nav>
    <form method="post" action="/logout" class="px-3 py-4 border-t border-slate-800 text-sm">
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token or request.cookies.get('csrf_token', '') }}">
      <button class="w-full text-left px-3 py-2 rounded-md hover:bg-slate-800" type="submit">
        Logout
      </button>
    </form>
  </aside>
  <div class="flex-1 flex flex-col">
    <header class="md:hidden border-b border-slate-800 bg-slate-900/60 px-4 py-3 flex items-center justify-between">
      <span class="font-semibold text-sm">FlexDB</span>
      <a href="/app/account" class="text-xs text-slate-300 hover:text-white">{{ user.email if user else "" }}</a>
    </header>
    <main class="flex-1 px-4 py-6 max-w-6xl mx-auto w-full">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
{% endblock %}
