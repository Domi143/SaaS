{% extends "layout_public.html" %}

{% block title %}Registrieren – FlexDB{% endblock %}

{% block content %}
<section class="py-16 px-4">
  <div class="max-w-md mx-auto bg-slate-900/70 border border-slate-800 rounded-xl p-6">
    <h1 class="text-xl font-semibold mb-4">Konto erstellen</h1>
    {% if error %}
    <div class="mb-3 text-sm text-red-400">
      {{ error }}
    </div>
    {% endif %}
    <form method="post" action="/register" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token or request.cookies.get('csrf_token', '') }}">
      <div class="space-y-1 text-sm">
        <label for="email" class="block text-slate-200">E‑Mail</label>
        <input id="email" name="email" type="email" required
               class="w-full rounded-md bg-slate-950 border border-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500" />
      </div>
      <div class="space-y-1 text-sm">
        <label for="password" class="block text-slate-200">Passwort</label>
        <input id="password" name="password" type="password" minlength="8" required
               class="w-full rounded-md bg-slate-950 border border-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500" />
      </div>
      <button type="submit"
              class="w-full mt-4 px-3 py-2 rounded-md bg-indigo-500 text-sm font-medium hover:bg-indigo-400">
        Kostenlos starten
      </button>
    </form>
    <p class="mt-4 text-xs text-slate-400">
      Schon ein Konto?
      <a href="/login" class="text-indigo-400 hover:text-indigo-300">Zum Login</a>
    </p>
  </div>
</section>
{% endblock %}
