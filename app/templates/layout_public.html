{% extends "base.html" %}

{% block body %}
<div class="min-h-screen flex flex-col bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-indigo-500"></div>
        <span class="font-semibold">FlexDB</span>
      </div>
      <nav class="flex items-center gap-4 text-sm">
        <a href="/login" class="text-slate-300 hover:text-white">Login</a>
        <a href="/register" class="px-3 py-1.5 rounded-md bg-indigo-500 text-white text-sm hover:bg-indigo-400">
          Kostenlos starten
        </a>
      </nav>
    </div>
  </header>
  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>
  <footer class="border-t border-slate-800 text-center text-xs text-slate-500 py-4">
    © {{ 2026 }} FlexDB – Flexible Workspaces in der Cloud
  </footer>
</div>
{% endblock %}
